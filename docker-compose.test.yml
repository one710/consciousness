# Local integration-test dependencies: Chroma + Postgres (pgvector) + PostgREST.
# Matches default URLs/keys used in test/chroma.test.ts and test/supabase-vector-store.test.ts.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   yarn test
#   docker compose -f docker-compose.test.yml down -v
#
# PostgREST is published on 54331 by default so this stack can run beside Supabase CLI (54321/54322).
# Chroma uses 8000. Override with SUPABASE_REST_PORT / CHROMA_PORT / TEST_PG_PORT if needed.

name: consciousness-test

services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    environment:
      CHROMA_SERVER_HOST: "0.0.0.0"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/api/v2/heartbeat'')"',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  db:
    image: pgvector/pgvector:pg16
    ports:
      # Default 54332 avoids clashing with Supabase CLI’s DB publish on 54322.
      - "${TEST_PG_PORT:-54332}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./docker/test/init/01-roles.sql:/docker-entrypoint-initdb.d/01-roles.sql:ro
      - ./supabase/migrations/20260401120000_consciousness_memory.sql:/docker-entrypoint-initdb.d/02-consciousness_memory.sql:ro
      - ./docker/test/init/03-grants.sql:/docker-entrypoint-initdb.d/03-grants.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  rest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_EXTRA_SEARCH_PATH: public,extensions
    restart: unless-stopped

  # Strip /rest/v1 prefix so @supabase/supabase-js matches plain PostgREST paths.
  gateway:
    image: nginx:alpine
    depends_on:
      - rest
    ports:
      - "${SUPABASE_REST_PORT:-54331}:80"
    volumes:
      - ./docker/test/nginx-gateway.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
